<h1 class="text-2xl text-orange-700 text-center">User List</h1>
<ul>
  @for (user of userData(); track user.id) {
    <div class="user-ul max-w-lg p-4 m-4 rounded-lg shadow-md">
      <ul class="space-y-2 text-gray-800">
        <li class="flex justify-between">
          <span>Name:</span><span>{{ user.name | titlecase }}</span>
        </li>
        <li class="flex justify-between">
          <span>Age:</span><span>{{ user.age }}</span>
        </li>
        <li class="flex justify-between">
          <span>ID:</span><span>{{ user.id }}</span>
        </li>
        <li class="flex justify-between">
          <span>Email:</span><span>{{ user.email }}</span>
        </li>
      </ul>
      <div>
        <button
          class="bg-red-500 p-1 text-white rounded-xs m-1 cursor-pointer"
          (click)="deleteUser(user.id)"
        >
          Delete User
        </button>
        <button
          class="bg-orange-400 p-1 text-white rounded-xs m-1 cursor-pointer"
          (click)="editUser(user.id)"
        >
          Edit User
        </button>
      </div>
    </div>
  }
</ul>
